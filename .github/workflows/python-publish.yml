name: Upload Python Package

on:
  release:
      types: [published]
  workflow_dispatch: # Allows you to run this manually for testing

permissions:
  contents: read

jobs:
  test-pypi-publish:
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/album-get
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Bump version for TestPyPI
        # This replaces 'version = "1.0.0"' with 'version = "1.0.0.devRUN_ID"'
        run: |
          sed -i 's/version = "\(.*\)"/version = "\1.dev${{ github.run_number }}"/' pyproject.toml
          echo "New version is:"
          grep "version =" pyproject.toml

      - name: Build and Publish to TestPyPI
        run: |
          python -m pip install build
          python -m build
        
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          verbose: true

  pypi-publish:
    runs-on: ubuntu-latest
    needs: [test-pypi-publish]
    environment:
      name: pypi
      url: https://pypi.org/p/album-get
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4 # We checkout again to get the CLEAN version (no .dev suffix)

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build and Publish to PyPI
        run: |
          python -m pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
